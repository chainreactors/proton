name: test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-sysinfo:
    name: "sysinfo (standalone module)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build sysinfo
        run: cd sysinfo && go build ./...

      - name: Test sysinfo
        run: cd sysinfo && go test -v -count=1 -short ./...

  test-modern:
    name: "Go 1.24 (modern)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Sync go.mod for current toolchain
        run: go mod tidy
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Generate
        run: go generate ./...
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Build
        run: |
          go build -v ./...
          go build -o found .
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Unit Tests
        run: go test -v -count=1 -short -timeout 120s ./proton/... ./pkg/runner/ ./cmd/...
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - File Scan
        run: |
          mkdir -p /tmp/found-ci-test
          cat > /tmp/found-ci-test/app.env <<'SECRETS'
          REDIS_URL=redis://10.0.0.5:6379
          MONGO=mongodb://admin:pass@172.16.0.1:27017/db
          JDBC=jdbc:mysql://root:secret@192.168.1.1:3306/prod
          AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
          SECRETS

          echo "--- text output ---"
          ./found -i /tmp/found-ci-test -q

          echo "--- json output ---"
          ./found -i /tmp/found-ci-test -o json -q | head -1 | python3 -c "import sys,json; json.load(sys.stdin)"

          echo "--- expression mode ---"
          ./found -i /tmp/found-ci-test -e 'AKIA[A-Z0-9]{16}' -q | grep -q AKIAIOSFODNN7EXAMPLE

          echo "--- zombie output ---"
          ./found -i /tmp/found-ci-test -o zombie -s /tmp/targets.json -q
          python3 -c "
          import json
          targets = [json.loads(l) for l in open('/tmp/targets.json') if l.strip()]
          assert len(targets) >= 1, f'expected >=1 zombie targets, got {len(targets)}'
          print(f'OK: {len(targets)} zombie targets')
          "
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - Baseline
        run: |
          ./found -i /tmp/found-ci-test -f /tmp/baseline.json -q
          test -f /tmp/baseline.json
          NEW=$(./found -i /tmp/found-ci-test --baseline /tmp/baseline.json -o json -q | wc -l)
          echo "new findings after baseline: $NEW (should be 0)"
          test "$NEW" -eq 0
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - Fail-on
        run: |
          ./found -i /tmp/found-ci-test --fail-on critical -q
          echo "no critical findings — exit 0 as expected"
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - Process Scan (self)
        run: |
          export FOUND_CI_SECRET="AKIAIOSFODNN7EXAMPLE"
          ./found --pid $$ -e 'AKIAIOSFODNN7EXAMPLE' -q || echo "pid scan requires permissions, skip in CI"
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - Validate
        run: |
          ./found --validate -t templates/found/keys/ -q
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Integration - Template List
        run: |
          COUNT=$(./found --list 2>&1 | head -1 | grep -oP '\d+')
          echo "templates: $COUNT"
          test "$COUNT" -gt 0
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

  test-cross-compile:
    name: "Cross Compile"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Sync go.mod
        run: go mod tidy
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Generate
        run: go generate ./...
        env:
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

      - name: Build
        run: go build -o /dev/null .
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"

  test-legacy:
    name: "Go 1.17 (legacy)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.17"

      - name: Downgrade go.mod for Go 1.17
        run: |
          sed -i '/^toolchain /d' go.mod
          sed -i 's/^go .*/go 1.17/' go.mod

      - name: Build proton library
        run: go build -v ./proton/file/
        env:
          CGO_ENABLED: "0"
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"
          GOFLAGS: "-mod=mod"

      - name: Test proton library
        run: go test -v -count=1 ./proton/file/
        env:
          CGO_ENABLED: "0"
          GONOSUMCHECK: "github.com/chainreactors/*"
          GONOSUMDB: "github.com/chainreactors/*"
          GOFLAGS: "-mod=mod"
